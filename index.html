<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الشيخ محمد صديق المنشاوي - الختمات المرتلة</title>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6JJ4WGLT89"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6JJ4WGLT89');

    <!-- استدعاء خط القاهرة -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Theme (Default) - "رقيق" and Soft */
            --bg-dark: #f8faf9;
            --bg-mid: #ffffff;
            --bg-light: #f0f4f2;
            --accent-gold: #c5a059;
            --accent-hover: #b38f4d;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --glass-bg: rgba(0, 0, 0, 0.02);
            --glass-border: rgba(0, 0, 0, 0.05);
            --glass-active: rgba(197, 160, 89, 0.08);
            --player-bg: rgba(255, 255, 255, 0.95);
            --switcher-btn-active: #ffffff;
            --shadow-intensity: rgba(0, 0, 0, 0.05);
        }

        body.dark-theme {
            --bg-dark: #020d0a;
            --bg-mid: #031813;
            --bg-light: #06241c;
            --accent-gold: #d4af37;
            --accent-hover: #e5c158;
            --text-main: #f1f5f9;
            --text-muted: #8ba29d;
            --glass-bg: rgba(255, 255, 255, 0.015);
            --glass-border: rgba(255, 255, 255, 0.03);
            --glass-active: rgba(212, 175, 55, 0.04);
            --player-bg: rgba(3, 24, 19, 0.95);
            --switcher-btn-active: radial-gradient(circle at top right, var(--bg-light), var(--bg-mid));
            --shadow-intensity: rgba(0, 0, 0, 0.4);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--accent-gold); border-radius: 10px; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding-bottom: 140px; 
            user-select: none;
            -webkit-user-select: none;
            transition: background-color 0.15s ease, color 0.15s ease;
        }

        .container {
            width: 100%;
            max-width: 480px; 
            padding: 8px 16px 20px 16px; 
            display: flex;
            flex-direction: column;
            gap: 10px; 
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 2px;
        }

        .top-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            width: 36px; 
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color 0.15s ease, background-color 0.15s ease, border-color 0.15s ease;
        }

        .top-btn:hover {
            color: var(--accent-gold);
            background: var(--glass-active);
            border-color: rgba(212, 175, 55, 0.2);
        }

        .top-btn svg { width: 18px; height: 18px; } 
        .top-btn span { font-size: 0.75rem; font-weight: 700; }

        header { text-align: center; padding: 4px 10px; }
        
        .header-image-container {
            display: flex;
            justify-content: center;
            margin-bottom: 10px; 
        }

        .header-img {
            height: 85px; 
            width: 85px;
            object-fit: cover; 
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            box-shadow: 0 4px 20px var(--shadow-intensity);
        }
        
        header h1 { 
            font-size: 1.25rem; 
            font-weight: 300;
            color: var(--text-main);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        header h1 strong { font-weight: 700; color: var(--accent-gold); }
        header p { font-size: 0.75rem; color: var(--text-muted); font-weight: 400; }

        .khatmah-cards-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            width: 100%;
            margin-bottom: 8px; 
        }

        .khatmah-card {
            background: var(--bg-mid);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 8px 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
            outline: none;
            box-shadow: 0 2px 5px var(--shadow-intensity);
        }

        .khatmah-card.active {
            background: var(--switcher-btn-active);
            border-color: var(--accent-gold);
            box-shadow: 0 3px 10px var(--shadow-intensity);
        }

        .khatmah-card-badge {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.1);
            color: var(--accent-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .khatmah-card-text { text-align: right; }
        .khatmah-card-title { font-size: 0.75rem; font-weight: 700; color: var(--text-main); line-height: 1.2; }
        .khatmah-card-desc { font-size: 0.6rem; color: var(--text-muted); }

        /* Search & Favorite Bar */
        .search-fav-bar {
            display: flex;
            gap: 8px;
            width: 100%;
            margin-bottom: 8px;
            align-items: center;
        }

        .search-box-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            padding: 10px 42px 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: var(--bg-mid);
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            box-shadow: 0 2px 5px var(--shadow-intensity);
        }

        .search-input:focus {
            border-color: var(--accent-gold);
        }

        .search-icon {
            position: absolute;
            color: var(--text-muted);
            width: 16px;
            height: 16px;
            pointer-events: none;
        }

        html[dir="rtl"] .search-input { padding: 10px 42px 10px 14px; }
        html[dir="rtl"] .search-icon { right: 14px; }
        html[dir="ltr"] .search-input { padding: 10px 14px 10px 42px; }
        html[dir="ltr"] .search-icon { left: 14px; }

        .fav-toggle-btn {
            background: var(--bg-mid);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s, background-color 0.15s;
            box-shadow: 0 2px 5px var(--shadow-intensity);
        }

        .fav-toggle-btn:hover {
            background: var(--glass-active);
            border-color: rgba(212, 175, 55, 0.2);
        }

        .fav-toggle-btn.active {
            color: #e74c3c;
            border-color: rgba(231, 76, 60, 0.3);
            background: rgba(231, 76, 60, 0.05);
        }

        .surah-list-container { display: flex; flex-direction: column; gap: 4px; }

        .surah-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px; 
            background: var(--bg-mid);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            transition: background-color 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
            box-shadow: 0 1px 3px var(--shadow-intensity);
        }

        .surah-row:hover {
            background: var(--glass-bg);
            border-color: rgba(212, 175, 55, 0.2);
            transform: scale(1.01);
        }

        .surah-row.active-row {
            border-color: var(--accent-gold);
            background: var(--glass-active);
        }

        .surah-info { display: flex; align-items: center; gap: 10px; cursor: default; }
        .surah-number { font-size: 0.7rem; color: var(--accent-gold); font-weight: 700; width: 25px; }
        .surah-name { font-size: 0.85rem; font-weight: 600; color: var(--text-main); }

        .actions { display: flex; align-items: center; gap: 8px; }
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color 0.15s ease, background-color 0.15s ease, transform 0.15s ease;
        }

        .icon-btn:hover { color: var(--accent-gold); background: var(--bg-light); }
        .icon-btn svg { width: 18px; height: 18px; }
        .icon-btn.playing-icon { color: var(--accent-gold); }

        .icon-btn.fav-btn.is-fav {
            color: #e74c3c;
        }

        /* Empty state styling */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* Floating Player */
        .floating-player {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 440px;
            background: var(--player-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 12px 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            display: none;
        }
        body.dark-theme .floating-player { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); border-color: rgba(212, 175, 55, 0.3); }

        .floating-player.active { display: block; animation: slideUp 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        @keyframes slideUp { from { bottom: -100px; opacity: 0; } to { bottom: 15px; opacity: 1; } }

        /* Seekbar with Thumb */
        .player-seekbar-container {
            width: 100%;
            height: 5px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            direction: ltr !important;
        }
        body.dark-theme .player-seekbar-container { background: rgba(255, 255, 255, 0.1); }

        .player-seekbar-fill { 
            height: 100%; 
            background: var(--accent-gold); 
            width: 0%; 
            border-radius: 10px; 
            position: relative;
        }

        .player-seekbar-thumb {
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #fff;
            border: 3px solid var(--accent-gold);
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .player-seekbar-container:hover .player-seekbar-thumb { transform: translateY(-50%) scale(1.2); }

        .player-compact-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .player-info { display: flex; flex-direction: column; flex: 1; min-width: 0; }
        .player-title { font-size: 0.85rem; font-weight: 700; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-time { font-size: 0.65rem; color: var(--text-muted); font-variant-numeric: tabular-nums; margin-top: 1px; }
        
        .player-actions { display: flex; align-items: center; gap: 6px; }
        .player-btn { 
            background: transparent; 
            border: none; 
            color: var(--text-main); 
            cursor: pointer; 
            padding: 6px; 
            border-radius: 50%; 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.15s ease, background-color 0.15s ease, opacity 0.15s ease;
        }
        .player-btn svg { width: 18px; height: 18px; }
        
        /* Circular Play Button */
        .play-toggle-btn { 
            background: var(--accent-gold); 
            color: #fff !important; 
            width: 38px; 
            height: 38px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            border-radius: 50% !important;
            box-shadow: 0 4px 10px rgba(197, 160, 89, 0.3);
        }
        .play-toggle-btn svg { width: 16px; height: 16px; }

        /* Option buttons style (Repeat, Autoplay & Sleep Timer) */
        .player-btn.opt-btn {
            color: var(--text-muted);
            opacity: 0.5;
        }
        .player-btn.opt-btn.active {
            color: var(--accent-gold);
            opacity: 1;
        }
        .player-btn.opt-btn svg { width: 15px; height: 15px; }

        /* Sleep Timer Sheet */
        .timer-sheet {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translate(-50%, 100%);
            width: 100%;
            max-width: 480px;
            background: var(--player-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--glass-border);
            border-radius: 20px 20px 0 0;
            z-index: 2000;
            transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
            padding: 20px;
            box-shadow: 0 -10px 30px var(--shadow-intensity);
            text-align: center;
            box-sizing: border-box;
        }
        .timer-sheet.active {
            transform: translate(-50%, 0);
        }
        .timer-backdrop {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .timer-backdrop.active {
            opacity: 1;
            pointer-events: auto;
        }
        .timer-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 15px;
        }
        .timer-options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .timer-options-grid button:last-child {
            grid-column: span 2;
        }
        .timer-option-btn {
            background: var(--bg-light);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.15s, border-color 0.15s;
        }
        .timer-option-btn:hover {
            background: var(--glass-active);
            border-color: var(--accent-gold);
        }
        .timer-option-btn.active-timer {
            background: var(--glass-active);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        /* Download Progress Overlay */
        .download-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center; z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        body.dark-theme .download-overlay { background: rgba(0, 0, 0, 0.85); }
        .download-overlay.active { opacity: 1; pointer-events: auto; }

        .download-card {
            background: var(--bg-mid); border: 1px solid var(--accent-gold);
            padding: 25px; border-radius: 20px; width: 85%; max-width: 320px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
        .download-title { font-size: 1rem; color: var(--text-main); }
        .download-surah-name { color: var(--accent-gold); font-weight: 700; margin-top: 5px; min-height: 20px; display: block; }
        .download-progress-container { height: 8px; background: var(--bg-light); border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .download-progress-fill { height: 100%; background: var(--accent-gold); width: 0%; transition: width 0.15s ease; }
        .download-percent { font-size: 0.8rem; color: var(--accent-gold); font-weight: 700; }

        .toast-notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--bg-mid); border: 1px solid var(--accent-gold);
            color: var(--text-main); padding: 8px 18px; border-radius: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 4000; font-size: 0.8rem;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .toast-notification.active { transform: translateX(-50%) translateY(0); }

    </style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <button class="top-btn" onclick="toggleTheme()" id="theme-toggle-btn">
                <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
            </button>
            <button class="top-btn" onclick="toggleLanguage()">
                <span id="lang-label">EN</span>
            </button>
        </div>

        <header>
            <div class="header-image-container">
                <img src="https://f.top4top.io/p_38068cvpd0.jpg" alt="الشيخ محمد صديق المنشاوي" class="header-img">
            </div>
            <h1 id="main-title">الشيخ محمد صديق <strong>المنشاوي</strong></h1>
            <p id="header-subtitle">الختمة المرتلة</p>
        </header>

        <div class="khatmah-cards-container">
            <button class="khatmah-card active" id="khatmah-1-btn" onclick="switchKhatmah(1)">
                <span class="khatmah-card-badge">١</span>
                <div class="khatmah-card-text">
                    <h3 class="khatmah-card-title" id="khatmah-1-title">الختمة الأولى</h3>
                    <p class="khatmah-card-desc" id="khatmah-1-desc">النسخة الكلاسيكية</p>
                </div>
            </button>
            <button class="khatmah-card" id="khatmah-2-btn" onclick="switchKhatmah(2)">
                <span class="khatmah-card-badge">٢</span>
                <div class="khatmah-card-text">
                    <h3 class="khatmah-card-title" id="khatmah-2-title">الختمة الثانية</h3>
                    <p class="khatmah-card-desc" id="khatmah-2-desc">النسخة المفقودة</p>
                </div>
            </button>
        </div>

        <!-- Search & Favorite Filter Bar -->
        <div class="search-fav-bar">
            <div class="search-box-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" class="search-input" id="search-input" placeholder="ابحث عن سورة..." oninput="handleSearch(this.value)">
            </div>
            <button class="fav-toggle-btn" id="fav-filter-btn" onclick="toggleFavFilter()" title="المفضلة">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                </svg>
            </button>
        </div>

        <div class="surah-list-container" id="main-surah-list"></div>
    </div>

    <!-- Floating Player -->
    <div class="floating-player" id="global-player">
        <div class="player-seekbar-container" id="progress-container">
            <div class="player-seekbar-fill" id="progress-bar-fill">
                <div class="player-seekbar-thumb" id="progress-thumb"></div>
            </div>
        </div>
        <div class="player-compact-row">
            <div class="player-info">
                <div class="player-title" id="player-track-title">اختر سورة للبدء...</div>
                <div class="player-time"><span id="curr-time">00:00</span> / <span id="total-time">00:00</span><span id="timer-indicator" style="display: none; color: var(--accent-gold); font-weight: bold; margin-inline-start: 4px;"></span></div>
            </div>
            <div class="player-actions">
                <!-- مؤقت النوم -->
                <button class="player-btn opt-btn" id="player-timer-btn" onclick="openTimerSheet()" title="مؤقت النوم">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                </button>

                <!-- خيار تكرار السورة -->
                <button class="player-btn opt-btn" id="player-repeat-btn" onclick="toggleRepeat()" title="تكرار السورة">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="17 1 21 5 17 9"></polyline>
                        <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                        <polyline points="7 23 3 19 7 15"></polyline>
                        <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                    </svg>
                </button>
                
                <button class="player-btn" onclick="playPrevious()"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg></button>
                <button class="player-btn play-toggle-btn" id="player-play-btn" onclick="togglePlayPause()"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button>

                khatmah1Desc: "Classic Edition",

                download: "Download", 
                choose: "Choose a Surah...", 
                surah: "", 
                play: "Play", 
                pause: "Pause",
                dl_start: "Downloading...", 
                dl_done: "Download Complete",
                repeatOn: "Repeat Enabled", 
                repeatOff: "Repeat Disabled",
                autoplayOn: "Autoplay Enabled", 
                autoplayOff: "Autoplay Disabled",
                repeatTooltip: "Repeat Surah", 
                autoplayTooltip: "Autoplay Next",
                favOn: "Added to favorites",
                favOff: "Removed from favorites",

                emptyResults: "No matching surahs found",
                searchPlaceholder: "Search surah...",
                timerTitle: "Sleep Timer",
                timerOff: "Sleep timer disabled",
                timerSet: "Sleep timer set for "
            }
        };

        // Default State
        let currentLang = 'ar';
        let currentTheme = 'light';
        let currentKhatmah = 1;
        let playingSurahId = null;
        let playingKhatmahId = null;
        let audioInstance = new Audio();
        audioInstance.preload = "auto";
        let isRepeat = false;
        let isAutoplay = true;

        // البحث والمفضلة
        let searchQuery = '';
        let showOnlyFavorites = false;
        let favorites = JSON.parse(localStorage.getItem('minshawi_favorites')) || { 1: [], 2: [] };

        // مؤقت النوم
        let sleepTimerHandle = null;
        let sleepTimerInterval = null;
        let sleepTimerSeconds = 0;
        let activeTimerMinutes = 0;

        // تخزين بيانات الختمتين في الذاكرة
        let khatmahData = {
            1: [],
            2: []
        };
        let dataLoaded = false;

        // Theme Logic
        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.body.classList.toggle('dark-theme', currentTheme === 'dark');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('theme-icon');
            if (currentTheme === 'dark') {
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
            } else {
                icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
            }
        }

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('lang-label').innerText = currentLang === 'ar' ? 'EN' : 'AR';
            renderUI();
            updateTexts();
        }

        function updateTexts() {
            const t = i18n[currentLang];
            document.getElementById('main-title').innerHTML = t.title;
            document.getElementById('khatmah-1-title').innerText = t.khatmah1;
            document.getElementById('khatmah-1-desc').innerText = t.khatmah1Desc;
            document.getElementById('khatmah-2-title').innerText = t.khatmah2;
            document.getElementById('khatmah-2-desc').innerText = t.khatmah2Desc;
            document.getElementById('player-repeat-btn').title = t.repeatTooltip;
            document.getElementById('player-autoplay-btn').title = t.autoplayTooltip;
            document.getElementById('search-input').placeholder = t.searchPlaceholder;
            document.getElementById('timer-title-text').innerText = t.timerTitle;
            
            // تحديث خيارات مؤقت النوم داخل الـ Bottom Sheet
            const optionBtns = document.querySelectorAll('.timer-option-btn');
            if (optionBtns.length >= 5) {
                if (currentLang === 'ar') {
                    optionBtns[0].innerText = "١٥ دقيقة";
                    optionBtns[1].innerText = "٣٠ دقيقة";
                    optionBtns[2].innerText = "٤٥ دقيقة";
                    optionBtns[3].innerText = "٦٠ دقيقة";
                    optionBtns[4].innerText = "إيقاف المؤقت";
                } else {
                    optionBtns[0].innerText = "15 minutes";
                    optionBtns[1].innerText = "30 minutes";
                    optionBtns[2].innerText = "45 minutes";
                    optionBtns[3].innerText = "60 minutes";
                    optionBtns[4].innerText = "Turn Off Timer";
                }
            }

            if (!playingSurahId) document.getElementById('player-track-title').innerText = t.choose;
        }

        // تحميل بيانات الختمتين مسبقاً
        async function preloadAllData() {
            try {
                const [data1, data2] = await Promise.all([
                    fetch('surahs_1.json?v=' + Date.now()).then(r => r.json()),
                    fetch('surahs_2.json?v=' + Date.now()).then(r => r.json())
                ]);
                khatmahData[1] = data1;
                khatmahData[2] = data2;
                dataLoaded = true;
                renderUI();
            } catch (error) {
                console.error("Error preloading data:", error);
                khatmahData[1] = [];
                khatmahData[2] = [];
                dataLoaded = true;
            }
        }

        function switchKhatmah(num) {
            currentKhatmah = num;
            document.getElementById('khatmah-1-btn').classList.toggle('active', num === 1);
            document.getElementById('khatmah-2-btn').classList.toggle('active', num === 2);
            renderUI();
        }

        // منطق البحث والمفضلة
        function handleSearch(val) {
            searchQuery = val.trim();
            renderUI();
        }

        function toggleFavFilter() {
            showOnlyFavorites = !showOnlyFavorites;
            document.getElementById('fav-filter-btn').classList.toggle('active', showOnlyFavorites);
            renderUI();
        }

        function toggleFavorite(id) {
            const list = favorites[currentKhatmah];
            const idx = list.indexOf(id);
            if (idx > -1) {
                list.splice(idx, 1);
                showToast(i18n[currentLang].favOff);
            } else {
                list.push(id);
                showToast(i18n[currentLang].favOn);
            }
            localStorage.setItem('minshawi_favorites', JSON.stringify(favorites));
            renderUI();
        }

        function renderUI() {
            const list = document.getElementById('main-surah-list');
            list.innerHTML = '';
            const t = i18n[currentLang];
            const surahs = khatmahData[currentKhatmah] || [];

            // تصفية السور حسب البحث وقائمة المفضلة
            const filteredSurahs = surahs.filter(s => {
                const name = (surahNames[currentLang][s.id] || s.name).toLowerCase();
                const matchesSearch = name.includes(searchQuery.toLowerCase());
                const matchesFav = !showOnlyFavorites || (favorites[currentKhatmah] && favorites[currentKhatmah].includes(s.id));
                return matchesSearch && matchesFav;
            });

            if (filteredSurahs.length === 0) {
                const msg = showOnlyFavorites ? t.emptyFavs : t.emptyResults;
                const iconSvg = showOnlyFavorites ? 
                    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:40px; height:40px; opacity:0.5;"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>` : 
                    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:40px; height:40px; opacity:0.5;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>`;
                
                list.innerHTML = `
                    <div class="empty-state">
                        ${iconSvg}
                        <span>${msg}</span>
                    </div>
                `;
                return;
            }

            filteredSurahs.forEach(s => {
                const name = surahNames[currentLang][s.id] || s.name;
                const isPlaying = (playingSurahId === s.id && playingKhatmahId === currentKhatmah);
                const isPaused = audioInstance.paused;
                const isFav = favorites[currentKhatmah] && favorites[currentKhatmah].includes(s.id);

                const favIcon = isFav ? 
                    `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path></svg>` : 
                    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>`;

                const row = document.createElement('div');
                row.className = `surah-row ${isPlaying ? 'active-row' : ''}`;
                row.innerHTML = `
                    <div class="surah-info">
                        <span class="surah-number">${String(s.id).padStart(3, '0')}</span>
                        <span class="surah-name">${t.surah}${name}</span>
                    </div>
                    <div class="actions">
                        <!-- المفضلة -->
                        <button class="icon-btn fav-btn ${isFav ? 'is-fav' : ''}" onclick="event.stopPropagation(); toggleFavorite(${s.id})" title="${t.only_favs}">
                            ${favIcon}
                        </button>
                        <!-- التشغيل -->
                        <button class="icon-btn ${isPlaying ? 'playing-icon' : ''}" onclick="playSurah(${JSON.stringify(s).replace(/"/g, '&quot;')})">
                            ${isPlaying && !isPaused ? 
                                '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>' : 
                                '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>'}
                        </button>
                        <!-- التحميل -->
                        <button class="icon-btn" onclick="event.stopPropagation(); downloadFile('${s.url}', '${name}')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        </button>
                    </div>
                `;
                list.appendChild(row);
            });
        }

        function playSurah(s) {
            if (playingSurahId === s.id && playingKhatmahId === currentKhatmah) {
                togglePlayPause();
                return;
            }
            playingSurahId = s.id;
            playingKhatmahId = currentKhatmah;
            
            audioInstance.pause();
            audioInstance.src = s.url;
            audioInstance.load(); 
            audioInstance.play().catch(e => console.log("Blocked:", e));
            
            document.getElementById('global-player').classList.add('active');
            const name = surahNames[currentLang][s.id] || s.name;
            document.getElementById('player-track-title').innerText = i18n[currentLang].surah + name;
            updatePlayBtn(true);
            renderUI();
        }

        function togglePlayPause() {
            if (audioInstance.paused) {
                audioInstance.play();
                updatePlayBtn(true);
            } else {
                audioInstance.pause();
                updatePlayBtn(false);
            }
            renderUI();
        }

        function updatePlayBtn(playing) {
            const btn = document.getElementById('player-play-btn');
            btn.innerHTML = playing ? 
                '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>' : 
                '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
        }

        function playNext() {
            const surahs = khatmahData[currentKhatmah] || [];
            const idx = surahs.findIndex(s => s.id === playingSurahId);
            if (idx < surahs.length - 1) {
                playSurah(surahs[idx + 1]);
            } else if (idx === surahs.length - 1) {
                playSurah(surahs[0]);
            }
        }

        function playPrevious() {
            const surahs = khatmahData[currentKhatmah] || [];
            const idx = surahs.findIndex(s => s.id === playingSurahId);
            if (idx > 0) playSurah(surahs[idx - 1]);
        }

        // تحكم التكرار والتشغيل التلقائي
        function toggleRepeat() {
            isRepeat = !isRepeat;
            document.getElementById('player-repeat-btn').classList.toggle('active', isRepeat);
            showToast(isRepeat ? i18n[currentLang].repeatOn : i18n[currentLang].repeatOff);
        }

        function toggleAutoplay() {
            isAutoplay = !isAutoplay;
            document.getElementById('player-autoplay-btn').classList.toggle('active', isAutoplay);
            showToast(isAutoplay ? i18n[currentLang].autoplayOn : i18n[currentLang].autoplayOff);
        }

        // منطق مؤقت النوم (Sleep Timer)
        function openTimerSheet() {
            document.getElementById('timer-sheet').classList.add('active');
            document.getElementById('timer-backdrop').classList.add('active');
            
            // تمييز الزر النشط حالياً بناءً على المدة المحددة
            const btns = document.querySelectorAll('.timer-option-btn');
            btns.forEach(btn => btn.classList.remove('active-timer'));
            if (activeTimerMinutes === 15) btns[0].classList.add('active-timer');
            else if (activeTimerMinutes === 30) btns[1].classList.add('active-timer');
            else if (activeTimerMinutes === 45) btns[2].classList.add('active-timer');
            else if (activeTimerMinutes === 60) btns[3].classList.add('active-timer');
            else if (activeTimerMinutes === 0) btns[4].classList.add('active-timer');
        }

        function closeTimerSheet() {
            document.getElementById('timer-sheet').classList.remove('active');
            document.getElementById('timer-backdrop').classList.remove('active');
        }

        function setSleepTimer(minutes) {
            clearInterval(sleepTimerInterval);
            clearTimeout(sleepTimerHandle);
            sleepTimerSeconds = 0;
            activeTimerMinutes = minutes;
            
            const timerBtn = document.getElementById('player-timer-btn');
            const indicator = document.getElementById('timer-indicator');

            if (minutes === 0) {
                timerBtn.classList.remove('active');
                indicator.style.display = 'none';
                showToast(i18n[currentLang].timerOff);
                closeTimerSheet();
                return;
            }

            timerBtn.classList.add('active');
            sleepTimerSeconds = minutes * 60;
            updateTimerBadge();

            showToast(i18n[currentLang].timerSet + minutes + " " + (currentLang === 'ar' ? "دقيقة" : "mins"));

            // تحديث المؤقت التنازلي التفاعلي
            sleepTimerInterval = setInterval(() => {
                if (sleepTimerSeconds > 1) {
                    sleepTimerSeconds--;
                    updateTimerBadge();
                } else {
                    clearInterval(sleepTimerInterval);
                }
            }, 1000);

            // التنفيذ عند انتهاء الوقت
            sleepTimerHandle = setTimeout(() => {
                audioInstance.pause();
                updatePlayBtn(false);
                renderUI();
                timerBtn.classList.remove('active');
                indicator.style.display = 'none';
                activeTimerMinutes = 0;
                clearInterval(sleepTimerInterval);
                showToast(currentLang === 'ar' ? "انتهى وقت النوم وتم إيقاف المقطع" : "Sleep timer ended, playback stopped");
            }, minutes * 60 * 1000);

            closeTimerSheet();
        }

        function updateTimerBadge() {
            const indicator = document.getElementById('timer-indicator');
            if (sleepTimerSeconds > 0) {
                const m = Math.floor(sleepTimerSeconds / 60);
                const s = sleepTimerSeconds % 60;
                const formatted = `${m}:${s < 10 ? '0' + s : s}`;
                indicator.innerText = ` | ⏳ ${formatted}`;
                indicator.style.display = 'inline';
            } else {
                indicator.style.display = 'none';
            }
        }

        // Seekbar Logic
        const progressContainer = document.getElementById('progress-container');
        const progressBarFill = document.getElementById('progress-bar-fill');
        const currTimeEl = document.getElementById('curr-time');
        const totalTimeEl = document.getElementById('total-time');

        audioInstance.ontimeupdate = () => {
            if (audioInstance.duration) {
                const percent = (audioInstance.currentTime / audioInstance.duration) * 100;
                progressBarFill.style.width = percent + '%';
                currTimeEl.innerText = formatTime(audioInstance.currentTime);
                totalTimeEl.innerText = formatTime(audioInstance.duration);
            }
        };

        function formatTime(secs) {
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
        }

        let isDragging = false;
        progressContainer.onmousedown = (e) => { isDragging = true; handleSeek(e); };
        window.onmousemove = (e) => { if (isDragging) handleSeek(e); };
        window.onmouseup = () => { isDragging = false; };
        progressContainer.ontouchstart = (e) => { isDragging = true; handleSeek(e.touches[0]); };
        window.ontouchmove = (e) => { if (isDragging) handleSeek(e.touches[0]); };
        window.ontouchend = () => { isDragging = false; };

        function handleSeek(e) {
            const rect = progressContainer.getBoundingClientRect();
            let percent = (e.clientX - rect.left) / rect.width;
            percent = Math.max(0, Math.min(1, percent));
            progressBarFill.style.width = (percent * 100) + '%';
            if (!isDragging) {
                audioInstance.currentTime = percent * audioInstance.duration;
            } else {
                currTimeEl.innerText = formatTime(percent * audioInstance.duration);
            }
        }
        
        progressContainer.onclick = (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audioInstance.currentTime = percent * audioInstance.duration;
        };

        // معالجة انتهاء المقطع الصوتي
        audioInstance.onended = () => { 
            if (isRepeat) {
                audioInstance.currentTime = 0;
                audioInstance.play().catch(e => console.log(e));
            } else if (isAutoplay) {
                playNext(); 
            } else {
                updatePlayBtn(false);
                renderUI();
            }
        };

        // Download Logic with Progress
        async function downloadFile(url, filename) {
            const overlay = document.getElementById('download-overlay');
            const fill = document.getElementById('dl-progress-fill');
            const percentText = document.getElementById('dl-percent');
            const surahNameText = document.getElementById('dl-surah-name');
            const titleText = document.getElementById('dl-title-text');
            const t = i18n[currentLang];

            titleText.innerText = t.dl_start;
            surahNameText.innerText = t.surah + filename;
            fill.style.width = '0%';
            percentText.innerText = '0%';

            overlay.classList.add('active');

            await new Promise(resolve => requestAnimationFrame(() => setTimeout(resolve, 50)));

            try {
                const response = await fetch(url);
                const reader = response.body.getReader();
                const contentLength = +response.headers.get('Content-Length');
                let receivedLength = 0;
                let chunks = [];

                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    receivedLength += value.length;
                    const percent = Math.round((receivedLength / contentLength) * 100);
                    fill.style.width = percent + '%';
                    percentText.innerText = percent + '%';
                }

                const blob = new Blob(chunks);
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `${filename}.mp3`;
                a.click();
                window.URL.revokeObjectURL(blobUrl);
                
                titleText.innerText = t.dl_done;
                setTimeout(() => { overlay.classList.remove('active'); }, 1200);
            } catch (error) {
                console.error("Download Error:", error);
                overlay.classList.remove('active');
                showToast("Download Failed");
            }
        }

        function showToast(msg) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.className = 'toast-notification';
                document.body.appendChild(toast);
            }
            toast.innerText = msg;
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 2200);
        }

        // Init - تحميل البيانات مسبقاً عند بدء التطبيق
        (async function() {
            updateThemeIcon();
            updateTexts();
            await preloadAllData();
        })();
    </script>
