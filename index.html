<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الشيخ محمد صديق المنشاوي - الختمات المرتلة</title>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6JJ4WGLT89"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6JJ4WGLT89');
    </script>

    <!-- استدعاء خط القاهرة -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Theme (Default) - "رقيق" and Soft */
            --bg-dark: #f8faf9;
            --bg-mid: #ffffff;
            --bg-light: #f0f4f2;
            --accent-gold: #c5a059;
            --accent-hover: #b38f4d;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --glass-bg: rgba(0, 0, 0, 0.02);
            --glass-border: rgba(0, 0, 0, 0.05);
            --glass-active: rgba(197, 160, 89, 0.08);
            --player-bg: rgba(255, 255, 255, 0.95);
            --switcher-btn-active: #ffffff;
            --shadow-intensity: rgba(0, 0, 0, 0.05);
        }

        body.dark-theme {
            --bg-dark: #020d0a;
            --bg-mid: #031813;
            --bg-light: #06241c;
            --accent-gold: #d4af37;
            --accent-hover: #e5c158;
            --text-main: #f1f5f9;
            --text-muted: #8ba29d;
            --glass-bg: rgba(255, 255, 255, 0.015);
            --glass-border: rgba(255, 255, 255, 0.03);
            --glass-active: rgba(212, 175, 55, 0.04);
            --player-bg: rgba(3, 24, 19, 0.95);
            --switcher-btn-active: radial-gradient(circle at top right, var(--bg-light), var(--bg-mid));
            --shadow-intensity: rgba(0, 0, 0, 0.4);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--accent-gold); border-radius: 10px; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding-bottom: 160px; 
            user-select: none;
            -webkit-user-select: none;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 480px; 
            padding: 15px 16px 25px 16px; 
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 4px;
        }

        .top-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            width: 36px; /* Back to original small size */
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .top-btn:hover {
            color: var(--accent-gold);
            background: var(--glass-active);
            border-color: rgba(212, 175, 55, 0.2);
        }

        .top-btn svg { width: 18px; height: 18px; } /* Back to original small icon size */
        .top-btn span { font-size: 0.75rem; font-weight: 700; }

        header { text-align: center; padding: 10px; }
        
        .header-image-container {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }

        .header-img {
            height: 100px;
            width: 100px;
            object-fit: cover; 
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            box-shadow: 0 4px 20px var(--shadow-intensity);
        }
        
        header h1 { 
            font-size: 1.3rem;
            font-weight: 300;
            color: var(--text-main);
            margin-bottom: 4px;
        }
        header h1 strong { font-weight: 700; color: var(--accent-gold); }
        header p { font-size: 0.8rem; color: var(--text-muted); font-weight: 400; }

        .khatmah-cards-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            width: 100%;
            margin-bottom: 12px;
        }

        .khatmah-card {
            background: var(--bg-mid);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 8px 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            outline: none;
            box-shadow: 0 2px 5px var(--shadow-intensity);
        }

        .khatmah-card.active {
            background: var(--switcher-btn-active);
            border-color: var(--accent-gold);
            box-shadow: 0 3px 10px var(--shadow-intensity);
        }

        .khatmah-card-badge {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.1);
            color: var(--accent-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .khatmah-card-text { text-align: right; }
        .khatmah-card-title { font-size: 0.75rem; font-weight: 700; color: var(--text-main); line-height: 1.2; }
        .khatmah-card-desc { font-size: 0.6rem; color: var(--text-muted); }

        .surah-list-container { display: flex; flex-direction: column; gap: 6px; }

        .surah-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            background: var(--bg-mid);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            transition: all 0.2s ease;
            cursor: pointer;
            box-shadow: 0 1px 3px var(--shadow-intensity);
        }

        .surah-row:hover {
            background: var(--glass-bg);
            border-color: rgba(212, 175, 55, 0.2);
            transform: scale(1.01);
        }

        .surah-row.active-row {
            border-color: var(--accent-gold);
            background: var(--glass-active);
        }

        .surah-info { display: flex; align-items: center; gap: 10px; }
        .surah-number { font-size: 0.7rem; color: var(--accent-gold); font-weight: 700; width: 25px; }
        .surah-name { font-size: 0.9rem; font-weight: 600; color: var(--text-main); }

        .actions { display: flex; align-items: center; gap: 8px; }
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .icon-btn:hover { color: var(--accent-gold); background: var(--bg-light); }
        .icon-btn svg { width: 18px; height: 18px; }
        .icon-btn.playing-icon { color: var(--accent-gold); }

        /* Floating Player */
        .floating-player {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 440px;
            background: var(--player-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            display: none;
        }
        body.dark-theme .floating-player { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); border-color: rgba(212, 175, 55, 0.3); }

        .floating-player.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { bottom: -100px; opacity: 0; } to { bottom: 20px; opacity: 1; } }

        /* Seekbar with Thumb */
        .player-seekbar-container {
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
        }
        body.dark-theme .player-seekbar-container { background: rgba(255, 255, 255, 0.1); }

        .player-seekbar-fill { 
            height: 100%; 
            background: var(--accent-gold); 
            width: 0%; 
            border-radius: 10px; 
            position: relative;
        }

        .player-seekbar-thumb {
            position: absolute;
            right: -7px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            background: #fff;
            border: 3px solid var(--accent-gold);
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .player-seekbar-container:hover .player-seekbar-thumb { transform: translateY(-50%) scale(1.2); }

        .player-compact-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .player-info { display: flex; flex-direction: column; flex: 1; min-width: 0; }
        .player-title { font-size: 0.9rem; font-weight: 700; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-time { font-size: 0.7rem; color: var(--text-muted); font-variant-numeric: tabular-nums; }
        
        .player-actions { display: flex; align-items: center; gap: 10px; }
        .player-btn { background: transparent; border: none; color: var(--text-main); cursor: pointer; padding: 6px; border-radius: 50%; }
        .player-btn svg { width: 22px; height: 22px; }
        
        /* Circular Play Button */
        .play-toggle-btn { 
            background: var(--accent-gold); 
            color: #fff !important; 
            width: 44px; 
            height: 44px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            border-radius: 50% !important;
            box-shadow: 0 4px 10px rgba(197, 160, 89, 0.3);
        }

        /* Download Progress Overlay */
        .download-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; z-index: 3000;
        }
        body.dark-theme .download-overlay { background: rgba(0, 0, 0, 0.85); }

        .download-card {
            background: var(--bg-mid); border: 1px solid var(--accent-gold);
            padding: 25px; border-radius: 20px; width: 85%; max-width: 320px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
        .download-title { font-size: 1rem; margin-bottom: 15px; color: var(--text-main); }
        .download-surah-name { color: var(--accent-gold); font-weight: 700; display: block; margin-top: 5px; }
        .download-progress-container { height: 8px; background: var(--bg-light); border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .download-progress-fill { height: 100%; background: var(--accent-gold); width: 0%; transition: width 0.3s; }
        .download-percent { font-size: 0.8rem; color: var(--accent-gold); font-weight: 700; }

        .toast-notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--bg-mid); border: 1px solid var(--accent-gold);
            color: var(--text-main); padding: 10px 20px; border-radius: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 4000; font-size: 0.85rem;
            transition: all 0.4s ease;
        }
        .toast-notification.active { transform: translateX(-50%) translateY(0); }

    </style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <button class="top-btn" onclick="toggleTheme()" id="theme-toggle-btn">
                <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
            </button>
            <button class="top-btn" onclick="toggleLanguage()">
                <span id="lang-label">EN</span>
            </button>
        </div>

        <header>
            <div class="header-image-container">
                <img src="https://f.top4top.io/p_38068cvpd0.jpg" alt="الشيخ محمد صديق المنشاوي" class="header-img">
            </div>
            <h1 id="main-title">الشيخ محمد صديق <strong>المنشاوي</strong></h1>
            <p id="header-subtitle">الختمة المرتلة</p>
        </header>

        <div class="khatmah-cards-container">
            <button class="khatmah-card active" id="khatmah-1-btn" onclick="switchKhatmah(1)">
                <span class="khatmah-card-badge">١</span>
                <div class="khatmah-card-text">
                    <h3 class="khatmah-card-title" id="khatmah-1-title">الختمة الأولى</h3>
                    <p class="khatmah-card-desc" id="khatmah-1-desc">النسخة الكلاسيكية</p>
                </div>
            </button>
            <button class="khatmah-card" id="khatmah-2-btn" onclick="switchKhatmah(2)">
                <span class="khatmah-card-badge">٢</span>
                <div class="khatmah-card-text">
                    <h3 class="khatmah-card-title" id="khatmah-2-title">الختمة الثانية</h3>
                    <p class="khatmah-card-desc" id="khatmah-2-desc">النسخة المفقودة</p>
                </div>
            </button>
        </div>

        <div class="surah-list-container" id="main-surah-list"></div>
    </div>

    <!-- Floating Player -->
    <div class="floating-player" id="global-player">
        <div class="player-seekbar-container" id="progress-container">
            <div class="player-seekbar-fill" id="progress-bar-fill">
                <div class="player-seekbar-thumb" id="progress-thumb"></div>
            </div>
        </div>
        <div class="player-compact-row">
            <div class="player-info">
                <div class="player-title" id="player-track-title">اختر سورة للبدء...</div>
                <div class="player-time"><span id="curr-time">00:00</span> / <span id="total-time">00:00</span></div>
            </div>
            <div class="player-actions">
                <button class="player-btn" onclick="playPrevious()"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg></button>
                <button class="player-btn play-toggle-btn" id="player-play-btn" onclick="togglePlayPause()"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button>
                <button class="player-btn" onclick="playNext()"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg></button>
            </div>
        </div>
    </div>

    <!-- Download Overlay -->
    <div class="download-overlay" id="download-overlay">
        <div class="download-card">
            <div class="download-title" id="dl-title-text">جاري التحميل... <span class="download-surah-name" id="dl-surah-name"></span></div>
            <div class="download-progress-container">
                <div class="download-progress-fill" id="dl-progress-fill"></div>
            </div>
            <div class="download-percent" id="dl-percent">0%</div>
        </div>
    </div>

    <script>
        const surahNamesEN = {
            1: "Al-Fatihah", 2: "Al-Baqarah", 3: "Ali 'Imran", 4: "An-Nisa'", 18: "Al-Kahf", 36: "Ya-Sin", 55: "Ar-Rahman", 114: "An-Nas"
        };

        const i18n = {
            ar: {
                title: "الشيخ محمد صديق <strong>المنشاوي</strong>",
                khatmah1: "الختمة الأولى", khatmah2: "الختمة الثانية",
                khatmah1Desc: "النسخة الكلاسيكية", khatmah2Desc: "النسخة المفقودة",
                download: "تحميل", choose: "اختر سورة للبدء...", surah: "سورة ", play: "تشغيل", pause: "إيقاف",
                dl_start: "جاري التحميل...", dl_done: "تم التحميل بنجاح"
            },
            en: {
                title: "Sheikh Mohamed Siddiq <strong>El-Minshawi</strong>",
                khatmah1: "First Khatmah", khatmah2: "Second Khatmah",
                khatmah1Desc: "Classic Edition", khatmah2Desc: "Lost Edition",
                download: "Download", choose: "Choose a Surah...", surah: "Surah ", play: "Play", pause: "Pause",
                dl_start: "Downloading...", dl_done: "Download Complete"
            }
        };

        // Default State
        let currentLang = 'ar';
        let currentTheme = 'light';
        let currentKhatmah = 1;
        let playingSurahId = null;
        let playingKhatmahId = null;
        let audioInstance = new Audio();
        audioInstance.preload = "auto";
        let surahs = [];

        // Theme Logic
        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.body.classList.toggle('dark-theme', currentTheme === 'dark');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('theme-icon');
            if (currentTheme === 'dark') {
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
            } else {
                icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
            }
        }

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('lang-label').innerText = currentLang === 'ar' ? 'EN' : 'AR';
            renderUI();
            updateTexts();
        }

        function updateTexts() {
            const t = i18n[currentLang];
            document.getElementById('main-title').innerHTML = t.title;
            document.getElementById('khatmah-1-title').innerText = t.khatmah1;
            document.getElementById('khatmah-1-desc').innerText = t.khatmah1Desc;
            document.getElementById('khatmah-2-title').innerText = t.khatmah2;
            document.getElementById('khatmah-2-desc').innerText = t.khatmah2Desc;
            if (!playingSurahId) document.getElementById('player-track-title').innerText = t.choose;
        }

        // Fetch Data from JSON (ORIGINAL LOGIC)
        async function fetchSurahs() {
            const fileName = currentKhatmah === 1 ? 'surahs_1.json' : 'surahs_2.json';
            try {
                const response = await fetch(fileName + '?v=' + Date.now());
                surahs = await response.json();
            } catch (error) {
                console.error("Error loading JSON:", error);
                surahs = [];
            }
        }

        async function switchKhatmah(num) {
            currentKhatmah = num;
            document.getElementById('khatmah-1-btn').classList.toggle('active', num === 1);
            document.getElementById('khatmah-2-btn').classList.toggle('active', num === 2);
            await fetchSurahs();
            renderUI();
        }

        function renderUI() {
            const list = document.getElementById('main-surah-list');
            list.innerHTML = '';
            const t = i18n[currentLang];

            surahs.forEach(s => {
                const name = currentLang === 'ar' ? s.name : (surahNamesEN[s.id] || s.name);
                const isPlaying = (playingSurahId === s.id && playingKhatmahId === currentKhatmah);
                const isPaused = audioInstance.paused;

                const row = document.createElement('div');
                row.className = `surah-row ${isPlaying ? 'active-row' : ''}`;
                row.onclick = () => playSurah(s);
                row.innerHTML = `
                    <div class="surah-info">
                        <span class="surah-number">${String(s.id).padStart(3, '0')}</span>
                        <span class="surah-name">${t.surah}${name}</span>
                    </div>
                    <div class="actions">
                        <button class="icon-btn ${isPlaying ? 'playing-icon' : ''}">
                            ${isPlaying && !isPaused ? 
                                '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>' : 
                                '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>'}
                        </button>
                        <button class="icon-btn" onclick="event.stopPropagation(); downloadFile('${s.url}', '${name}')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        </button>
                    </div>
                `;
                list.appendChild(row);
            });
        }

        function playSurah(s) {
            if (playingSurahId === s.id && playingKhatmahId === currentKhatmah) {
                togglePlayPause();
                return;
            }
            playingSurahId = s.id;
            playingKhatmahId = currentKhatmah;
            
            audioInstance.pause();
            audioInstance.src = s.url;
            audioInstance.load(); 
            audioInstance.play().catch(e => console.log("Blocked:", e));
            
            document.getElementById('global-player').classList.add('active');
            const name = currentLang === 'ar' ? s.name : (surahNamesEN[s.id] || s.name);
            document.getElementById('player-track-title').innerText = i18n[currentLang].surah + name;
            updatePlayBtn(true);
            renderUI();
        }

        function togglePlayPause() {
            if (audioInstance.paused) {
                audioInstance.play();
                updatePlayBtn(true);
            } else {
                audioInstance.pause();
                updatePlayBtn(false);
            }
            renderUI();
        }

        function updatePlayBtn(playing) {
            const btn = document.getElementById('player-play-btn');
            btn.innerHTML = playing ? 
                '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>' : 
                '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
        }

        function playNext() {
            const idx = surahs.findIndex(s => s.id === playingSurahId);
            if (idx < surahs.length - 1) playSurah(surahs[idx + 1]);
        }

        function playPrevious() {
            const idx = surahs.findIndex(s => s.id === playingSurahId);
            if (idx > 0) playSurah(surahs[idx - 1]);
        }

        // Seekbar Logic
        const progressContainer = document.getElementById('progress-container');
        const progressBarFill = document.getElementById('progress-bar-fill');
        const currTimeEl = document.getElementById('curr-time');
        const totalTimeEl = document.getElementById('total-time');

        audioInstance.ontimeupdate = () => {
            if (audioInstance.duration) {
                const percent = (audioInstance.currentTime / audioInstance.duration) * 100;
                progressBarFill.style.width = percent + '%';
                currTimeEl.innerText = formatTime(audioInstance.currentTime);
                totalTimeEl.innerText = formatTime(audioInstance.duration);
            }
        };

        function formatTime(secs) {
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
        }

        let isDragging = false;
        progressContainer.onmousedown = (e) => { isDragging = true; handleSeek(e); };
        window.onmousemove = (e) => { if (isDragging) handleSeek(e); };
        window.onmouseup = () => { isDragging = false; };
        progressContainer.ontouchstart = (e) => { isDragging = true; handleSeek(e.touches[0]); };
        window.ontouchmove = (e) => { if (isDragging) handleSeek(e.touches[0]); };
        window.ontouchend = () => { isDragging = false; };

        function handleSeek(e) {
            const rect = progressContainer.getBoundingClientRect();
            let percent = (e.clientX - rect.left) / rect.width;
            percent = Math.max(0, Math.min(1, percent));
            progressBarFill.style.width = (percent * 100) + '%';
            if (!isDragging) {
                audioInstance.currentTime = percent * audioInstance.duration;
            } else {
                currTimeEl.innerText = formatTime(percent * audioInstance.duration);
            }
        }
        
        progressContainer.onclick = (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audioInstance.currentTime = percent * audioInstance.duration;
        };

        audioInstance.onended = () => { playNext(); };

        // Download Logic with Progress
        async function downloadFile(url, filename) {
            const overlay = document.getElementById('download-overlay');
            const fill = document.getElementById('dl-progress-fill');
            const percentText = document.getElementById('dl-percent');
            const surahNameText = document.getElementById('dl-surah-name');
            const titleText = document.getElementById('dl-title-text');
            const t = i18n[currentLang];

            surahNameText.innerText = t.surah + filename;
            titleText.innerHTML = `${t.dl_start} <span class="download-surah-name">${t.surah}${filename}</span>`;
            overlay.style.display = 'flex';
            fill.style.width = '0%';
            percentText.innerText = '0%';

            try {
                const response = await fetch(url);
                const reader = response.body.getReader();
                const contentLength = +response.headers.get('Content-Length');
                let receivedLength = 0;
                let chunks = [];

                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    receivedLength += value.length;
                    const percent = Math.round((receivedLength / contentLength) * 100);
                    fill.style.width = percent + '%';
                    percentText.innerText = percent + '%';
                }

                const blob = new Blob(chunks);
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `${filename}.mp3`;
                a.click();
                window.URL.revokeObjectURL(blobUrl);
                
                titleText.innerText = t.dl_done;
                setTimeout(() => { overlay.style.display = 'none'; }, 1500);
            } catch (error) {
                overlay.style.display = 'none';
                showToast("Download Failed");
            }
        }

        function showToast(msg) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.className = 'toast-notification';
                document.body.appendChild(toast);
            }
            toast.innerText = msg;
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 3000);
        }

        // Init
        (async function() {
            updateThemeIcon();
            updateTexts();
            await fetchSurahs();
            renderUI();
        })();
    </script>
</body>
</html>
