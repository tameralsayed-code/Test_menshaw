<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الشيخ محمد صديق المنشاوي - الختمات المرتلة</title>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6JJ4WGLT89"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6JJ4WGLT89');
    </script>

    <!-- استدعاء خط القاهرة -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Theme (Default) - "رقيق" and Soft */
            --bg-dark: #f8faf9;
            --bg-mid: #ffffff;
            --bg-light: #f0f4f2;
            --accent-gold: #c5a059;
            --accent-hover: #b38f4d;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --glass-bg: rgba(0, 0, 0, 0.02);
            --glass-border: rgba(0, 0, 0, 0.05);
            --glass-active: rgba(197, 160, 89, 0.08);
            --player-bg: rgba(255, 255, 255, 0.95);
            --switcher-btn-active: #ffffff;
            --shadow-intensity: rgba(0, 0, 0, 0.05);
        }

        body.dark-theme {
            --bg-dark: #020d0a;
            --bg-mid: #031813;
            --bg-light: #06241c;
            --accent-gold: #d4af37;
            --accent-hover: #e5c158;
            --text-main: #f1f5f9;
            --text-muted: #8ba29d;
            --glass-bg: rgba(255, 255, 255, 0.015);
            --glass-border: rgba(255, 255, 255, 0.03);
            --glass-active: rgba(212, 175, 55, 0.04);
            --player-bg: rgba(3, 24, 19, 0.95);
            --switcher-btn-active: radial-gradient(circle at top right, var(--bg-light), var(--bg-mid));
            --shadow-intensity: rgba(0, 0, 0, 0.4);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--accent-gold); border-radius: 10px; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding-bottom: 140px; 
            user-select: none;
            -webkit-user-select: none;
            transition: background-color 0.15s ease, color 0.15s ease;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            will-change: scroll-position;
        }

        .container {
            width: 100%;
            max-width: 480px; 
            padding: 8px 16px 20px 16px; 
            display: flex;
            flex-direction: column;
            gap: 8px; 
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 2px;
        }

        .top-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            width: 36px; 
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color 0.15s ease, background-color 0.15s ease, border-color 0.15s ease;
        }

        .top-btn:hover {
            color: var(--accent-gold);
            background: var(--glass-active);
            border-color: rgba(212, 175, 55, 0.2);
        }

        .top-btn svg { width: 18px; height: 18px; } 
        .top-btn span { font-size: 0.75rem; font-weight: 700; }

        header { text-align: center; padding: 4px 10px; }
        
        .header-image-container {
            display: flex;
            justify-content: center;
            margin-bottom: 10px; 
        }

        .header-img {
            height: 85px; 
            width: 85px;
            object-fit: cover; 
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            box-shadow: 0 4px 20px var(--shadow-intensity);
        }
        
        header h1 { 
            font-size: 1.25rem; 
            font-weight: 300;
            color: var(--text-main);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        header h1 strong { font-weight: 700; color: var(--accent-gold); }
        header p { font-size: 0.75rem; color: var(--text-muted); font-weight: 400; }

        .khatmah-cards-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            width: 100%;
            margin-bottom: 8px; 
        }

        .khatmah-card {
            background: var(--bg-mid);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 8px 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
            outline: none;
            box-shadow: 0 2px 5px var(--shadow-intensity);
        }

        .khatmah-card.active {
            background: var(--switcher-btn-active);
            border-color: var(--accent-gold);
            box-shadow: 0 3px 10px var(--shadow-intensity);
        }

        .khatmah-card-badge {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.1);
            color: var(--accent-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .khatmah-card-text { text-align: right; }
        .khatmah-card-title { font-size: 0.75rem; font-weight: 700; color: var(--text-main); line-height: 1.2; }
        .khatmah-card-desc { font-size: 0.6rem; color: var(--text-muted); }

        /* Search Bar */
        .search-container {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-mid);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 8px 12px;
            margin-bottom: 8px;
            transition: border-color 0.15s ease, background-color 0.15s ease;
        }

        .search-container:focus-within {
            border-color: var(--accent-gold);
            background: var(--glass-active);
        }

        .search-container svg {
            width: 16px;
            height: 16px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        #search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            outline: none;
            min-width: 0;
        }

        #search-input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .search-clear-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            display: none;
            flex-shrink: 0;
            transition: color 0.15s ease;
        }

        .search-clear-btn:hover {
            color: var(--accent-gold);
        }

        .search-clear-btn.active {
            display: block;
        }

        .search-clear-btn svg {
            width: 14px;
            height: 14px;
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding-bottom: 2px;
        }

        .filter-tabs::-webkit-scrollbar {
            height: 2px;
        }

        .filter-tab {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .filter-tab:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        .filter-tab.active {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            color: #fff;
        }

        .surah-list-container { 
            display: flex; 
            flex-direction: column; 
            gap: 6px;
            -webkit-transform: translate3d(0, 0, 0);
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .surah-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px; 
            background: var(--bg-mid);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            transition: background-color 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
            box-shadow: 0 1px 3px var(--shadow-intensity);
            -webkit-transform: translate3d(0, 0, 0);
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .surah-row:hover {
            background: var(--glass-bg);
            border-color: rgba(212, 175, 55, 0.2);
            transform: scale(1.01);
        }

        .surah-row.active-row {
            border-color: var(--accent-gold);
            background: var(--glass-active);
        }

        .surah-info { display: flex; align-items: center; gap: 10px; cursor: default; }
        .surah-number { font-size: 0.7rem; color: var(--accent-gold); font-weight: 700; width: 25px; }
        .surah-name { font-size: 0.85rem; font-weight: 600; color: var(--text-main); }

        .actions { display: flex; align-items: center; gap: 8px; }
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color 0.15s ease, background-color 0.15s ease;
        }

        .icon-btn:hover { color: var(--accent-gold); background: var(--bg-light); }
        .icon-btn svg { width: 18px; height: 18px; }
        .icon-btn.playing-icon { color: var(--accent-gold); }
        .icon-btn.favorite-active { color: #e74c3c; }

        /* Khatmah Title in Favorites */
        .khatmah-section-title {
            padding: 12px 0 6px 0;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent-gold);
            text-align: right;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 6px;
        }

        /* Floating Player */
        .floating-player {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 440px;
            background: var(--player-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 12px 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            display: none;
            -webkit-transform: translate3d(-50%, 0, 0);
            transform: translate3d(-50%, 0, 0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        body.dark-theme .floating-player { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); border-color: rgba(212, 175, 55, 0.3); }

        .floating-player.active { 
            display: block; 
            animation: slideUp 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            -webkit-transform: translate3d(-50%, 0, 0);
            transform: translate3d(-50%, 0, 0);
        }
        @keyframes slideUp { 
            from { 
                bottom: -100px; 
                opacity: 0; 
                -webkit-transform: translate3d(-50%, 0, 0);
                transform: translate3d(-50%, 0, 0);
            } 
            to { 
                bottom: 15px; 
                opacity: 1; 
                -webkit-transform: translate3d(-50%, 0, 0);
                transform: translate3d(-50%, 0, 0);
            } 
        }

        /* Seekbar with Thumb */
        .player-seekbar-container {
            width: 100%;
            height: 5px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            direction: ltr !important;
        }
        body.dark-theme .player-seekbar-container { background: rgba(255, 255, 255, 0.1); }

        .player-seekbar-fill { 
            height: 100%; 
            background: var(--accent-gold); 
            width: 0%; 
            border-radius: 10px; 
            position: relative;
        }

        .player-seekbar-thumb {
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #fff;
            border: 3px solid var(--accent-gold);
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .player-seekbar-container:hover .player-seekbar-thumb { transform: translateY(-50%) scale(1.2); }

        .player-compact-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .player-info { display: flex; flex-direction: column; flex: 1; min-width: 0; }
        .player-title { font-size: 0.85rem; font-weight: 700; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-time { font-size: 0.65rem; color: var(--text-muted); font-variant-numeric: tabular-nums; margin-top: 1px; }
        
        .player-actions { display: flex; align-items: center; gap: 6px; }
        .player-btn { 
            background: transparent; 
            border: none; 
            color: var(--text-main); 
            cursor: pointer; 
            padding: 6px; 
            border-radius: 50%; 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.15s ease, background-color 0.15s ease, opacity 0.15s ease;
        }
        .player-btn svg { width: 18px; height: 18px; }
        
        /* Circular Play Button */
        .play-toggle-btn { 
            background: var(--accent-gold); 
            color: #fff !important; 
            width: 38px; 
            height: 38px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            border-radius: 50% !important;
            box-shadow: 0 4px 10px rgba(197, 160, 89, 0.3);
        }
        .play-toggle-btn svg { width: 16px; height: 16px; }

        /* Option buttons style (Repeat & Autoplay) */
        .player-btn.opt-btn {
            color: var(--text-muted);
            opacity: 0.5;
        }
        .player-btn.opt-btn.active {
            color: var(--accent-gold);
            opacity: 1;
        }
        .player-btn.opt-btn svg { width: 15px; height: 15px; }

        /* Sleep Timer Modal */
        .sleep-timer-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .sleep-timer-modal.active {
            display: flex;
            opacity: 1;
        }

        .sleep-timer-card {
            background: var(--bg-mid);
            border: 1px solid var(--accent-gold);
            border-radius: 20px;
            padding: 20px;
            width: 85%;
            max-width: 300px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .sleep-timer-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 15px;
        }

        .sleep-timer-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .sleep-timer-option {
            background: var(--bg-light);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            transition: all 0.15s ease;
        }

        .sleep-timer-option:hover {
            border-color: var(--accent-gold);
            background: var(--glass-active);
        }

        .sleep-timer-option.selected {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            color: #fff;
        }

        .sleep-timer-close {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.15s ease;
        }

        .sleep-timer-close:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        /* Download Progress Overlay */
        .download-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center; z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        body.dark-theme .download-overlay { background: rgba(0, 0, 0, 0.85); }
        .download-overlay.active { opacity: 1; pointer-events: auto; }

        .download-card {
            background: var(--bg-mid); border: 1px solid var(--accent-gold);
            padding: 25px; border-radius: 20px; width: 85%; max-width: 320px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
        .download-title { font-size: 1rem; color: var(--text-main); }
        .download-surah-name { color: var(--accent-gold); font-weight: 700; margin-top: 5px; min-height: 20px; display: block; }
        .download-progress-container { height: 8px; background: var(--bg-light); border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .download-progress-fill { height: 100%; background: var(--accent-gold); width: 0%; transition: width 0.15s ease; }
        .download-percent { font-size: 0.8rem; color: var(--accent-gold); font-weight: 700; }

        .toast-notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--bg-mid); border: 1px solid var(--accent-gold);
            color: var(--text-main); padding: 8px 18px; border-radius: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 4000; font-size: 0.8rem;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .toast-notification.active { transform: translateX(-50%) translateY(0); }

    </style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <button class="top-btn" onclick="toggleTheme()" id="theme-toggle-btn">
                <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
            </button>
            <button class="top-btn" onclick="toggleLanguage()">
                <span id="lang-label">EN</span>
            </button>
        </div>

        <header>
            <div class="header-image-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/29/Minshawy.jpg" alt="الشيخ محمد صديق المنشاوي" class="header-img">
            </div>
            <h1 id="main-title">الشيخ محمد صديق <strong>المنشاوي</strong></h1>
            <p id="header-subtitle">الختمة المرتلة</p>
        </header>

        <div class="khatmah-cards-container">
            <button class="khatmah-card active" id="khatmah-1-btn" onclick="switchKhatmah(1)">
                <span class="khatmah-card-badge">١</span>
                <div class="khatmah-card-text">
                    <h3 class="khatmah-card-title" id="khatmah-1-title">الختمة الأولى</h3>
                    <p class="khatmah-card-desc" id="khatmah-1-desc">النسخة الكلاسيكية</p>
                </div>
            </button>
            <button class="khatmah-card" id="khatmah-2-btn" onclick="switchKhatmah(2)">
                <span class="khatmah-card-badge">٢</span>
                <div class="khatmah-card-text">
                    <h3 class="khatmah-card-title" id="khatmah-2-title">الختمة الثانية</h3>
                    <p class="khatmah-card-desc" id="khatmah-2-desc">النسخة المفقودة</p>
                </div>
            </button>
        </div>

        <!-- Search Bar -->
        <div class="search-container">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input type="text" id="search-input" placeholder="ابحث عن سورة..." />
            <button class="search-clear-btn" onclick="clearSearch()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs" id="filter-tabs">
            <button class="filter-tab active" onclick="filterSurahs('all')" data-filter="all" id="tab-all">الكل</button>
            <button class="filter-tab" onclick="filterSurahs('favorites')" data-filter="favorites" id="tab-favorites">المفضلة</button>
        </div>

        <div class="surah-list-container" id="main-surah-list"></div>
    </div>

    <!-- Floating Player -->
    <div class="floating-player" id="global-player">
        <div class="player-seekbar-container" id="progress-container">
            <div class="player-seekbar-fill" id="progress-bar-fill">
                <div class="player-seekbar-thumb" id="progress-thumb"></div>
            </div>
        </div>
        <div class="player-compact-row">
            <div class="player-info">
                <div class="player-title" id="player-track-title">اختر سورة للبدء...</div>
                <div class="player-time"><span id="curr-time">00:00</span> / <span id="total-time">00:00</span></div>
            </div>
            <div class="player-actions">
                <!-- خيار تكرار السورة -->
                <button class="player-btn opt-btn" id="player-repeat-btn" onclick="toggleRepeat()" title="تكرار السورة">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="17 1 21 5 17 9"></polyline>
                        <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                        <polyline points="7 23 3 19 7 15"></polyline>
                        <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                    </svg>
                </button>
                
                <button class="player-btn" onclick="playPrevious()"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg></button>
                <button class="player-btn play-toggle-btn" id="player-play-btn" onclick="togglePlayPause()"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button>
                <button class="player-btn" onclick="playNext()"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg></button>
                
                <!-- مؤقت النوم -->
                <button class="player-btn opt-btn" id="player-sleep-btn" onclick="openSleepTimer()" title="مؤقت النوم">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="13" r="8"></circle>
                        <path d="M12 9v4l3 2"></path>
                    </svg>
                </button>

                <!-- خيار التشغيل التلقائي المتتالي -->
                <button class="player-btn opt-btn active" id="player-autoplay-btn" onclick="toggleAutoplay()" title="التشغيل التلقائي">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M13 17l5-5-5-5M6 17l5-5-5-5"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Sleep Timer Modal -->
    <div class="sleep-timer-modal" id="sleep-timer-modal">
        <div class="sleep-timer-card">
            <div class="sleep-timer-title" id="sleep-timer-title">مؤقت النوم</div>
            <div class="sleep-timer-options">
                <button class="sleep-timer-option" onclick="setSleepTimer(15)">15 دقيقة</button>
                <button class="sleep-timer-option" onclick="setSleepTimer(30)">30 دقيقة</button>
                <button class="sleep-timer-option" onclick="setSleepTimer(45)">45 دقيقة</button>
                <button class="sleep-timer-option" onclick="setSleepTimer(60)">ساعة واحدة</button>
            </div>
            <button class="sleep-timer-close" onclick="closeSleepTimer()" id="sleep-timer-close">إغلاق</button>
        </div>
    </div>

    <!-- Download Overlay -->
    <div class="download-overlay" id="download-overlay">
        <div class="download-card">
            <div class="download-title" id="dl-title-text">جاري التحميل...</div>
            <div class="download-surah-name" id="dl-surah-name"></div>
            <div class="download-progress-container">
                <div class="download-progress-fill" id="dl-progress-fill"></div>
            </div>
            <div class="download-percent" id="dl-percent">0%</div>
        </div>
    </div>

    <script>
        const i18n = {
            ar: {
                title: "الشيخ محمد صديق <strong>المنشاوي</strong>",
                khatmah1: "الختمة الأولى", 
                khatmah2: "الختمة الثانية",
                khatmah1Desc: "النسخة الكلاسيكية", 
                khatmah2Desc: "النسخة المفقودة",
                download: "تحميل", 
                choose: "اختر سورة للبدء...", 
                surah: "سورة ", 
                play: "تشغيل", 
                pause: "إيقاف",
                dl_start: "جاري التحميل...", 
                dl_done: "تم التحميل بنجاح",
                repeatOn: "تم تفعيل تكرار السورة", 
                repeatOff: "تم إيقاف تكرار السورة",
                autoplayOn: "تم تفعيل التشغيل التلقائي", 
                autoplayOff: "تم إيقاف التشغيل التلقائي",
                repeatTooltip: "تكرار السورة", 
                autoplayTooltip: "التشغيل التلقائي",
                search: "ابحث عن سورة...",
                all: "الكل",
                favorites: "المفضلة",
                addedToFavorites: "تمت إضافة السورة للمفضلة",
                removedFromFavorites: "تمت إزالة السورة من المفضلة",
                sleepTimer: "مؤقت النوم",
                sleepTimerSet: "تم ضبط مؤقت النوم لـ",
                sleepTimerCanceled: "تم إلغاء مؤقت النوم",
                sleepTimerClose: "إغلاق"
            },
            en: {
                title: "Sheikh Mohamed Siddiq <strong>El-Minshawi</strong>",
                khatmah1: "First Khatmah", 
                khatmah2: "Second Khatmah",
                khatmah1Desc: "Classic Edition", 
                khatmah2Desc: "Lost Edition",
                download: "Download", 
                choose: "Choose a Surah...", 
                surah: "", 
                play: "Play", 
                pause: "Pause",
                dl_start: "Downloading...", 
                dl_done: "Download Complete",
                repeatOn: "Repeat Enabled", 
                repeatOff: "Repeat Disabled",
                autoplayOn: "Autoplay Enabled", 
                autoplayOff: "Autoplay Disabled",
                repeatTooltip: "Repeat Surah", 
                autoplayTooltip: "Autoplay Next",
                search: "Search for a Surah...",
                all: "All",
                favorites: "Favorites",
                addedToFavorites: "Added to Favorites",
                removedFromFavorites: "Removed from Favorites",
                sleepTimer: "Sleep Timer",
                sleepTimerSet: "Sleep timer set for",
                sleepTimerCanceled: "Sleep timer canceled",
                sleepTimerClose: "Close"
            }
        };

        // Default State
        let currentLang = 'ar';
        let currentTheme = 'light';
        let currentKhatmah = 1;
        let playingSurahId = null;
        let playingKhatmahId = null;
        let audioInstance = new Audio();
        audioInstance.preload = "auto";
        let isRepeat = false;
        let isAutoplay = true;
        let currentFilter = 'all';
        let searchQuery = '';

        // تخزين بيانات الختمتين في الذاكرة
        let khatmahData = {
            1: [],
            2: []
        };
        let dataLoaded = false;

        // المفضلات - مفصولة حسب الختمة
        let favoritesData = JSON.parse(localStorage.getItem('favorites')) || {};
        if (!favoritesData[1]) favoritesData[1] = [];
        if (!favoritesData[2]) favoritesData[2] = [];

        // مؤقت النوم
        let sleepTimerTimeout = null;
        let sleepTimerMinutes = 0;

        // Theme Logic
        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.body.classList.toggle('dark-theme', currentTheme === 'dark');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('theme-icon');
            if (currentTheme === 'dark') {
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
            } else {
                icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
            }
        }

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('lang-label').innerText = currentLang === 'ar' ? 'EN' : 'AR';
            renderUI();
            updateTexts();
        }

        function updateTexts() {
            const t = i18n[currentLang];
            document.getElementById('main-title').innerHTML = t.title;
            document.getElementById('khatmah-1-title').innerText = t.khatmah1;
            document.getElementById('khatmah-1-desc').innerText = t.khatmah1Desc;
            document.getElementById('khatmah-2-title').innerText = t.khatmah2;
            document.getElementById('khatmah-2-desc').innerText = t.khatmah2Desc;
            document.getElementById('search-input').placeholder = t.search;
            document.getElementById('tab-all').innerText = t.all;
            document.getElementById('tab-favorites').innerText = t.favorites;
            document.getElementById('player-repeat-btn').title = t.repeatTooltip;
            document.getElementById('player-autoplay-btn').title = t.autoplayTooltip;
            document.getElementById('player-sleep-btn').title = t.sleepTimer;
            document.getElementById('sleep-timer-title').innerText = t.sleepTimer;
            document.getElementById('sleep-timer-close').innerText = t.sleepTimerClose;
            if (!playingSurahId) document.getElementById('player-track-title').innerText = t.choose;
        }

        // تحميل بيانات الختمتين بشكل مستقل لتفادي توقف الصفحة إذا فقد أحد الملفين
        async function preloadAllData() {
            try {
                // محاولة تحميل الختمة الأولى
                try {
                    const response1 = await fetch('surahs_1.json?v=' + Date.now());
                    if (response1.ok) {
                        khatmahData[1] = await response1.json();
                    }
                } catch (e) {
                    console.warn("Could not load surahs_1.json:", e);
                }

                // محاولة تحميل الختمة الثانية
                try {
                    const response2 = await fetch('surahs_2.json?v=' + Date.now());
                    if (response2.ok) {
                        khatmahData[2] = await response2.json();
                    }
                } catch (e) {
                    console.warn("Could not load surahs_2.json:", e);
                }

                dataLoaded = true;

                // التبديل للختمة المتوفرة تلقائياً
                if (khatmahData[1].length === 0 && khatmahData[2].length > 0) {
                    switchKhatmah(2);
                } else {
                    renderUI();
                }
            } catch (error) {
                console.error("General loading error:", error);
            }
        }

        async function fetchCurrentKhatmahOnly() {
            const fileName = currentKhatmah === 1 ? 'surahs_1.json' : 'surahs_2.json';
            try {
                const response = await fetch(fileName + '?v=' + Date.now());
                if (response.ok) {
                    const data = await response.json();
                    khatmahData[currentKhatmah] = data;
                    dataLoaded = true;
                    renderUI();
                }
            } catch (error) {
                console.error("Fallback single fetch error:", error);
            }
        }

        async function switchKhatmah(num) {
            currentKhatmah = num;
            document.getElementById('khatmah-1-btn').classList.toggle('active', num === 1);
            document.getElementById('khatmah-2-btn').classList.toggle('active', num === 2);
            searchQuery = '';
            document.getElementById('search-input').value = '';
            currentFilter = 'all';
            updateFilterTabs();
            
            if (!khatmahData[num] || khatmahData[num].length === 0) {
                await fetchCurrentKhatmahOnly();
            } else {
                renderUI();
            }
        }

        // البحث والتصفية
        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value.trim();
            document.querySelector('.search-clear-btn').classList.toggle('active', searchQuery.length > 0);
            renderUI();
        });

        function clearSearch() {
            searchQuery = '';
            document.getElementById('search-input').value = '';
            document.querySelector('.search-clear-btn').classList.remove('active');
            renderUI();
        }

        function filterSurahs(filter) {
            currentFilter = filter;
            updateFilterTabs();
            renderUI();
        }

        function updateFilterTabs() {
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.filter === currentFilter);
            });
        }

        function toggleFavorite(surahId) {
            if (!favoritesData[currentKhatmah]) {
                favoritesData[currentKhatmah] = [];
            }
            
            const index = favoritesData[currentKhatmah].indexOf(surahId);
            if (index > -1) {
                favoritesData[currentKhatmah].splice(index, 1);
                showToast(i18n[currentLang].removedFromFavorites);
            } else {
                favoritesData[currentKhatmah].push(surahId);
                showToast(i18n[currentLang].addedToFavorites);
            }
            localStorage.setItem('favorites', JSON.stringify(favoritesData));
            renderUI();
        }

        function isFavorite(surahId) {
            if (!favoritesData[currentKhatmah]) {
                favoritesData[currentKhatmah] = [];
            }
            return favoritesData[currentKhatmah].includes(surahId);
        }

        function getFilteredSurahs() {
            let surahs = khatmahData[currentKhatmah] || [];

            // تطبيق البحث
            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                surahs = surahs.filter(s => {
                    const name = s.name || '';
                    return name.toLowerCase().includes(query) || s.id.toString().includes(query);
                });
            }

            // تطبيق التصفية
            if (currentFilter === 'favorites') {
                surahs = surahs.filter(s => isFavorite(s.id));
            }

            surahs.sort((a, b) => a.id - b.id);

            return surahs;
        }

        function renderUI() {
            const list = document.getElementById('main-surah-list');
            list.innerHTML = '';
            const t = i18n[currentLang];
            
            if (currentFilter === 'favorites') {
                renderFavoritesGrouped(list, t);
                return;
            }
            
            const surahs = getFilteredSurahs();
            renderSurahList(list, t, surahs);
        }

        function renderSurahList(list, t, surahs) {
            surahs.forEach(s => {
                const name = s.name; // الاعتماد الكلي على الاسم القادم من الـ JSON
                const isPlaying = (playingSurahId === s.id && playingKhatmahId === currentKhatmah);
                const isPaused = audioInstance.paused;
                const isFav = isFavorite(s.id);

                const row = document.createElement('div');
                row.className = `surah-row ${isPlaying ? 'active-row' : ''}`;
                row.innerHTML = `
                    <div class="surah-info">
                        <span class="surah-number">${String(s.id).padStart(3, '0')}</span>
                        <span class="surah-name">${t.surah}${name}</span>
                    </div>
                    <div class="actions">
                        <button class="icon-btn ${isFav ? 'favorite-active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${s.id})">
                            ${isFav ? 
                                '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>' : 
                                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>'}
                        </button>
                        <button class="icon-btn ${isPlaying ? 'playing-icon' : ''}" onclick="playSurah(${JSON.stringify(s).replace(/"/g, '&quot;')})">
                            ${isPlaying && !isPaused ? 
                                '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>' : 
                                '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>'}
                        </button>
                        <button class="icon-btn" onclick="event.stopPropagation(); downloadFile('${s.url}', '${name}')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        </button>
                    </div>
                `;
                list.appendChild(row);
            });
        }

        function renderFavoritesGrouped(list, t) {
            let hasAnyFavorites = false;
            
            for (let khatmahNum = 1; khatmahNum <= 2; khatmahNum++) {
                if (!favoritesData[khatmahNum] || favoritesData[khatmahNum].length === 0) continue;
                
                hasAnyFavorites = true;
                const khatmahSurahs = khatmahData[khatmahNum] || [];
                const filteredSurahs = khatmahSurahs.filter(s => favoritesData[khatmahNum].includes(s.id));
                
                if (filteredSurahs.length === 0) continue;
                
                const khatmahTitle = document.createElement('div');
                khatmahTitle.className = 'khatmah-section-title';
                khatmahTitle.innerText = (khatmahNum == 1 ? t.khatmah1 : t.khatmah2);
                list.appendChild(khatmahTitle);
                
                renderSurahList(list, t, filteredSurahs);
            }
            
            if (!hasAnyFavorites) {
                const emptyMsg = document.createElement('div');
                emptyMsg.style.cssText = 'text-align: center; padding: 30px 20px; color: var(--text-muted); font-size: 0.85rem;';
                emptyMsg.innerText = t.favorites + ' ' + (currentLang === 'ar' ? 'فارغة' : 'is empty');
                list.appendChild(emptyMsg);
            }
        }

        function playSurah(s) {
            if (playingSurahId === s.id && playingKhatmahId === currentKhatmah) {
                togglePlayPause();
                return;
            }
            playingSurahId = s.id;
            playingKhatmahId = currentKhatmah;
            
            audioInstance.pause();
            audioInstance.src = s.url;
            audioInstance.load(); 
            audioInstance.play().catch(e => console.log("Blocked:", e));
            
            document.getElementById('global-player').classList.add('active');
            const name = s.name;
            document.getElementById('player-track-title').innerText = i18n[currentLang].surah + name;
            updatePlayBtn(true);
            renderUI();
        }

        function togglePlayPause() {
            if (audioInstance.paused) {
                audioInstance.play();
                updatePlayBtn(true);
            } else {
                audioInstance.pause();
                updatePlayBtn(false);
            }
            renderUI();
        }

        function updatePlayBtn(playing) {
            const btn = document.getElementById('player-play-btn');
            btn.innerHTML = playing ? 
                '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>' : 
                '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
        }

        function playNext() {
            const surahs = getFilteredSurahs();
            const idx = surahs.findIndex(s => s.id === playingSurahId);
            if (idx < surahs.length - 1) {
                playSurah(surahs[idx + 1]);
            } else if (idx === surahs.length - 1) {
                playSurah(surahs[0]);
            }
        }

        function playPrevious() {
            const surahs = getFilteredSurahs();
            const idx = surahs.findIndex(s => s.id === playingSurahId);
            if (idx > 0) playSurah(surahs[idx - 1]);
        }

        function toggleRepeat() {
            isRepeat = !isRepeat;
            document.getElementById('player-repeat-btn').classList.toggle('active', isRepeat);
            showToast(isRepeat ? i18n[currentLang].repeatOn : i18n[currentLang].repeatOff);
        }

        function toggleAutoplay() {
            isAutoplay = !isAutoplay;
            document.getElementById('player-autoplay-btn').classList.toggle('active', isAutoplay);
            showToast(isAutoplay ? i18n[currentLang].autoplayOn : i18n[currentLang].autoplayOff);
        }

        function openSleepTimer() {
            document.getElementById('sleep-timer-modal').classList.add('active');
        }

        function closeSleepTimer() {
            document.getElementById('sleep-timer-modal').classList.remove('active');
        }

        function setSleepTimer(minutes) {
            if (sleepTimerTimeout) clearTimeout(sleepTimerTimeout);
            
            sleepTimerMinutes = minutes;
            document.getElementById('sleep-timer-modal').classList.remove('active');
            
            showToast(i18n[currentLang].sleepTimerSet + ' ' + minutes + ' ' + (currentLang === 'ar' ? 'دقيقة' : 'minutes'));
            
            document.getElementById('player-sleep-btn').classList.add('active');
            
            sleepTimerTimeout = setTimeout(() => {
                audioInstance.pause();
                updatePlayBtn(false);
                document.getElementById('player-sleep-btn').classList.remove('active');
                sleepTimerMinutes = 0;
            }, minutes * 60 * 1000);
        }

        const progressContainer = document.getElementById('progress-container');
        const progressBarFill = document.getElementById('progress-bar-fill');
        const currTimeEl = document.getElementById('curr-time');
        const totalTimeEl = document.getElementById('total-time');

        audioInstance.ontimeupdate = () => {
            if (audioInstance.duration) {
                const percent = (audioInstance.currentTime / audioInstance.duration) * 100;
                progressBarFill.style.width = percent + '%';
                currTimeEl.innerText = formatTime(audioInstance.currentTime);
                totalTimeEl.innerText = formatTime(audioInstance.duration);
            }
        };

        function formatTime(secs) {
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
        }

        let isDragging = false;
        progressContainer.onmousedown = (e) => { isDragging = true; handleSeek(e); };
        window.onmousemove = (e) => { if (isDragging) handleSeek(e); };
        window.onmouseup = () => { isDragging = false; };
        progressContainer.ontouchstart = (e) => { isDragging = true; handleSeek(e.touches[0]); };
        window.ontouchmove = (e) => { if (isDragging) handleSeek(e.touches[0]); };
        window.ontouchend = () => { isDragging = false; };

        function handleSeek(e) {
            const rect = progressContainer.getBoundingClientRect();
            let percent = (e.clientX - rect.left) / rect.width;
            percent = Math.max(0, Math.min(1, percent));
            progressBarFill.style.width = (percent * 100) + '%';
            if (!isDragging) {
                audioInstance.currentTime = percent * audioInstance.duration;
            } else {
                currTimeEl.innerText = formatTime(percent * audioInstance.duration);
            }
        }
        
        progressContainer.onclick = (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audioInstance.currentTime = percent * audioInstance.duration;
        };

        audioInstance.onended = () => { 
            if (isRepeat) {
                audioInstance.currentTime = 0;
                audioInstance.play().catch(e => console.log(e));
            } else if (isAutoplay) {
                playNext(); 
            } else {
                updatePlayBtn(false);
                renderUI();
            }
        };

        async function downloadFile(url, filename) {
            const overlay = document.getElementById('download-overlay');
            const fill = document.getElementById('dl-progress-fill');
            const percentText = document.getElementById('dl-percent');
            const surahNameText = document.getElementById('dl-surah-name');
            const titleText = document.getElementById('dl-title-text');
            const t = i18n[currentLang];

            titleText.innerText = t.dl_start;
            surahNameText.innerText = t.surah + filename;
            fill.style.width = '0%';
            percentText.innerText = '0%';

            overlay.classList.add('active');

            await new Promise(resolve => requestAnimationFrame(() => setTimeout(resolve, 50)));

            try {
                const response = await fetch(url);
                const reader = response.body.getReader();
                const contentLength = +response.headers.get('Content-Length');
                let receivedLength = 0;
                let chunks = [];

                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    receivedLength += value.length;
                    const percent = Math.round((receivedLength / contentLength) * 100);
                    fill.style.width = percent + '%';
                    percentText.innerText = percent + '%';
                }

                const blob = new Blob(chunks);
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `${filename}.mp3`;
                a.click();
                window.URL.revokeObjectURL(blobUrl);
                
                titleText.innerText = t.dl_done;
                setTimeout(() => { overlay.classList.remove('active'); }, 1200);
            } catch (error) {
                console.error("Download Error:", error);
                overlay.classList.remove('active');
                showToast("Download Failed");
            }
        }

        function showToast(msg) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.className = 'toast-notification';
                document.body.appendChild(toast);
            }
            toast.innerText = msg;
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 2200);
        }

        // بدء تحميل البيانات مباشرة عند تشغيل الصفحة
        (async function() {
            updateThemeIcon();
            updateTexts();
            await preloadAllData();
        })();

        document.getElementById('sleep-timer-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('sleep-timer-modal')) {
                closeSleepTimer();
            }
        });
    </script>
</body>
</html>
